services:
  crm-api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./crm.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DEFAULT_TENANT_SLUG=${DEFAULT_TENANT_SLUG:-default}
      - DEFAULT_TENANT_NAME=${DEFAULT_TENANT_NAME:-Default Tenant}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-ChangeMe123!}
    volumes:
      - crm_data:/app

volumes:
  crm_data:
